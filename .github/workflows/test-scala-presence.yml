name: Test Scala Presence

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

jobs:
  test-scala-presence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Ensure Java sources do not import Scala
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n --include='*.java' 'import scala\.' src/main/java; then
            echo "Found forbidden Scala import in Java sources."
            exit 1
          fi
